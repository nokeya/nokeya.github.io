<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Колесо Пингвина: 8 секторов</title>

    <style>
        :root {
            --red: #e74c3c;
            --orange: #e67e22;
            --yellow: #f1c40f;
            --lightgreen: #82e0aa;
            --green: #2ecc71;
            --lightblue: #85c1e9;
            --blue: #3498db;
            --purple: #9b59b6;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #e0f7fa 0%, #aed6f1 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.7);
            text-align: center;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            cursor: pointer;
            border-radius: 50%;
            border: 12px solid #5dade2;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), inset 0 0 15px rgba(0,0,0,0.4);
            background: conic-gradient(
                from 0deg,
                var(--red) 0deg 45deg,
                var(--orange) 45deg 90deg,
                var(--yellow) 90deg 135deg,
                var(--lightgreen) 135deg 180deg,
                var(--green) 180deg 225deg,
                var(--lightblue) 225deg 270deg,
                var(--blue) 270deg 315deg,
                var(--purple) 315deg 360deg
            );
        }

        .icon {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            margin-top: -40px;
            margin-left: -40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 38px; /* Увеличили эмодзи */
        }

        /* Немного сдвинули иконки ближе к центру, так как они стали больше */
        .icon:nth-child(1) { transform: rotate(22.5deg) translateY(-105px) rotate(-22.5deg); }
        .icon:nth-child(2) { transform: rotate(67.5deg) translateY(-105px) rotate(-67.5deg); }
        .icon:nth-child(3) { transform: rotate(112.5deg) translateY(-105px) rotate(-112.5deg); }
        .icon:nth-child(4) { transform: rotate(157.5deg) translateY(-105px) rotate(-157.5deg); }
        .icon:nth-child(5) { transform: rotate(202.5deg) translateY(-105px) rotate(-202.5deg); }
        .icon:nth-child(6) { transform: rotate(247.5deg) translateY(-105px) rotate(-247.5deg); }
        .icon:nth-child(7) { transform: rotate(292.5deg) translateY(-105px) rotate(-292.5deg); }
        .icon:nth-child(8) { transform: rotate(337.5deg) translateY(-105px) rotate(-337.5deg); }

        .blocks-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
            max-width: 70px;
        }

        .or-slash {
            font-size: 20px;
            color: #2c3e50;
            font-weight: bold;
            margin: 0 2px;
        }

        .arrow-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.15, 1);
            pointer-events: none;
        }

        .result-box {
            margin-top: 40px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .instruction {
            font-size: 20px;
            color: #34495e;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 280px;
            transition: all 0.3s ease;
        }

        .highlight {
            color: #e74c3c;
            transform: scale(1.05);
        }

    </style>
</head>
<body>

    <div class="title">Спаси Пингвина!</div>

    <div class="wheel-container" id="wheel">

        <div class="icon">
            <div class="blocks-wrapper">
                <svg width="22" height="25" viewBox="0 0 30 34"><polygon points="15,0 30,8.5 30,25.5 15,34 0,25.5 0,8.5" fill="#3498db" stroke="#2c3e50" stroke-width="2"/></svg>
                <svg width="22" height="25" viewBox="0 0 30 34"><polygon points="15,0 30,8.5 30,25.5 15,34 0,25.5 0,8.5" fill="#3498db" stroke="#2c3e50" stroke-width="2"/></svg>
            </div>
        </div>

        <div class="icon">
            <svg width="28" height="32" viewBox="0 0 30 34"><polygon points="15,0 30,8.5 30,25.5 15,34 0,25.5 0,8.5" fill="#ffffff" stroke="#bdc3c7" stroke-width="2"/></svg>
        </div>

        <div class="icon">🚫</div>

        <div class="icon">
            <div class="blocks-wrapper">
                <svg width="20" height="23" viewBox="0 0 30 34"><polygon points="15,0 30,8.5 30,25.5 15,34 0,25.5 0,8.5" fill="#ffffff" stroke="#bdc3c7" stroke-width="2"/></svg>
                <span class="or-slash">|</span>
                <svg width="20" height="23" viewBox="0 0 30 34"><polygon points="15,0 30,8.5 30,25.5 15,34 0,25.5 0,8.5" fill="#3498db" stroke="#2c3e50" stroke-width="2"/></svg>
            </div>
        </div>

        <div class="icon">
            <div class="blocks-wrapper">
                <svg width="22" height="25" viewBox="0 0 30 34"><polygon points="15,0 30,8.5 30,25.5 15,34 0,25.5 0,8.5" fill="#ffffff" stroke="#bdc3c7" stroke-width="2"/></svg>
                <svg width="22" height="25" viewBox="0 0 30 34"><polygon points="15,0 30,8.5 30,25.5 15,34 0,25.5 0,8.5" fill="#ffffff" stroke="#bdc3c7" stroke-width="2"/></svg>
            </div>
        </div>

        <div class="icon">
            <svg width="28" height="32" viewBox="0 0 30 34"><polygon points="15,0 30,8.5 30,25.5 15,34 0,25.5 0,8.5" fill="#3498db" stroke="#2c3e50" stroke-width="2"/></svg>
        </div>

        <div class="icon">🔄</div>

        <div class="icon">
            <div class="blocks-wrapper">
                <svg width="18" height="21" viewBox="0 0 30 34"><polygon points="15,0 30,8.5 30,25.5 15,34 0,25.5 0,8.5" fill="#ffffff" stroke="#bdc3c7" stroke-width="2"/></svg>
                <svg width="18" height="21" viewBox="0 0 30 34"><polygon points="15,0 30,8.5 30,25.5 15,34 0,25.5 0,8.5" fill="#ffffff" stroke="#bdc3c7" stroke-width="2"/></svg>
                <svg width="18" height="21" viewBox="0 0 30 34"><polygon points="15,0 30,8.5 30,25.5 15,34 0,25.5 0,8.5" fill="#3498db" stroke="#2c3e50" stroke-width="2"/></svg>
            </div>
        </div>

        <div class="arrow-wrapper" id="arrow">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <path d="M 46 50 L 54 50 L 52 25 L 57 25 L 50 10 L 43 25 L 48 25 Z" fill="rgba(0,0,0,0.3)" transform="translate(3, 4)"/>
                <circle cx="50" cy="50" r="9" fill="rgba(0,0,0,0.3)" transform="translate(3, 4)"/>

                <path d="M 46 50 L 54 50 L 52 25 L 57 25 L 50 10 L 43 25 L 48 25 Z" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>

                <circle cx="50" cy="50" r="9" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
                <circle cx="50" cy="50" r="3" fill="#f1948a"/>
            </svg>
        </div>

    </div>

    <div class="result-box">
        <div class="instruction" id="instructionText">Нажми на колесо, чтобы крутить!</div>
    </div>

    <script>
        const wheel = document.getElementById('wheel');
        const arrow = document.getElementById('arrow');
        const instruction = document.getElementById('instructionText');

        let currentRotation = 0;
        let isSpinning = false;

        const results = [
            "Выбей 2 синие льдинки!",
            "Выбей 1 белую льдинку!",
            "Пропуск хода 🚫",
            "Выбей 1 любую льдинку (белую или синюю)",
            "Выбей 2 белые льдинки!",
            "Выбей 1 синюю льдинку!",
            "Крути еще раз! 🔄",
            "Выбей 2 белые и 1 синюю льдинку!"
        ];

        wheel.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;

            instruction.innerText = "Крутится...";
            instruction.classList.remove("highlight");

            const extraSpins = 5 + Math.floor(Math.random() * 4);
            const randomDegree = Math.floor(Math.random() * 360);

            currentRotation += (extraSpins * 360) + randomDegree;
            arrow.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;

                const normalizedDegree = currentRotation % 360;
                const sectorIndex = Math.floor(normalizedDegree / 45);

                instruction.innerText = results[sectorIndex];
                instruction.classList.add("highlight");

            }, 3000);
        });
    </script>
</body>
</html>
